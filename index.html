function getIcon(cat){
  const icons={'女装':'👕','运动鞋':'👟','数据线':'🔌','手机壳':'📱','蓝牙耳机':'🎧','充电宝':'🔋'};
  return icons[cat]||'📦';
}
function getFiltered(){
  return currentCat==='all'?products:products.filter(p=>p.cat===currentCat);
}
function renderTable(){
  const filtered=getFiltered();
  const total=filtered.length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  const start=(currentPage-1)*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,total);
  const pageItems=filtered.slice(start,end);
  const tbody=document.getElementById('productTable');
  tbody.innerHTML=pageItems.map(p=>{
    const soldClass=p.sold>50000?'sold-high':p.sold>10000?'sold-medium':'sold-low';
    const priceNum=parseFloat(p.price.replace(/[^0-9.]/g,''))||0;
    return '<tr><td><div class="product-cell"><div class="product-icon">'+getIcon(p.cat)+'</div><div><div class="product-name">'+p.title.substring(0,40)+(p.title.length>40?'...':'')+'</div><span class="product-tag">'+p.cat+'</span></div></div></td><td class="price">'+p.price+' <small>/ $'+(priceNum*0.14).toFixed(2)+'</small></td><td class="'+soldClass+'">'+p.sold.toLocaleString()+' 件</td><td>'+p.repurchase+'</td><td class="info"><strong>'+p.shop+'</strong></td><td class="info">'+p.location+'</td></tr>';
  }).join('');
  document.getElementById('pageInfo').textContent='显示 '+(total>0?start+1:'0')+'-'+end+' / '+total+' 条';
  const btns=document.getElementById('pageButtons');
  let html='<button '+(currentPage===1?'disabled ':'')+'onclick="goPage('+(currentPage-1)+')">上一页</button>';
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||(i>=currentPage-2&&i<=currentPage+2)){
      html+='<button class="'+(i===currentPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    }else if(i===currentPage-3||i===currentPage+3){
      html+='<span style="padding:0 4px">...</span>';
    }
  }
  html+='<button '+(currentPage===totalPages||totalPages===0?'disabled ':'')+'onclick="goPage('+(currentPage+1)+')">下一页</button>';
  btns.innerHTML=html;
}
function goPage(p){
  const total=getFiltered().length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  if(p<1||p>totalPages)return;
  currentPage=p;
  renderTable();
  window.scrollTo({top:400,behavior:'smooth'});
}
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCat=tab.dataset.cat;
    currentPage=1;
    renderTable();
  });
});
renderTable();
</script>
</body>
