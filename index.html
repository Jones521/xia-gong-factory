<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataHunter - 1688实时数据查询</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --dark: #0F172A;
  --gray: #64748B;
  --light: #F1F5F9;
  --white: #FFFFFF;
  --success: #10B981;
  --danger: #EF4444;
}
body { font-family: 'Inter', sans-serif; color: var(--dark); background: var(--light); min-height: 100vh; }

nav { padding: 16px 24px; background: var(--dark); display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 18px; font-weight: 800; color: white; }
.logo span { color: var(--primary); }
.nav-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

.container { max-width: 900px; margin: 0 auto; padding: 24px; }

/* Search */
.search-section { background: white; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.search-section h2 { font-size: 22px; margin-bottom: 8px; }
.search-section p { color: var(--gray); font-size: 14px; margin-bottom: 20px; }
.search-box { display: flex; gap: 12px; }
.search-box input { flex: 1; padding: 14px 20px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.search-box input:focus { border-color: var(--primary); }
.search-box button { background: var(--primary); color: white; padding: 14px 28px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.search-box button:hover { background: var(--primary-dark); }
.search-box button:disabled { background: #94A3B8; cursor: not-allowed; }

.quick-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.quick-tags span { background: var(--light); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--gray); cursor: pointer; transition: all 0.2s; }
.quick-tags span:hover { background: #DBEAFE; color: var(--primary); }

/* Results */
.results-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: none; }
.results-section.show { display: block; }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #E2E8F0; }
.result-header h3 { font-size: 16px; }
.result-header span { font-size: 12px; color: var(--gray); }
.result-header .badge { background: #DCFCE7; color: #166534; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }

.result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-table th { background: #F8FAFC; padding: 10px 12px; text-align: left; font-weight: 600; color: var(--gray); border-bottom: 1px solid #E2E8F0; }
.result-table td { padding: 12px; border-bottom: 1px solid #F1F5F9; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:hover { background: #FAFBFF; }

.product-name { font-weight: 600; margin-bottom: 2px; }
.product-cat { font-size: 11px; color: var(--primary); background: #EFF6FF; padding: 2px 8px; border-radius: 4px; display: inline-block; }

.price { font-weight: 700; }
.sold { font-weight: 600; padding: 3px 10px; border-radius: 20px; display: inline-block; }
.sold.high { color: #166534; background: #DCFCE7; }
.sold.medium { color: #92400E; background: #FEF3C7; }
.sold.low { color: #475569; background: #F1F5F9; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--gray); }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--gray); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty h3 { font-size: 18px; color: var(--dark); margin-bottom: 8px; }

/* CTA */
.cta-section { background: var(--dark); color: white; border-radius: 16px; padding: 32px; text-align: center; margin-top: 24px; }
.cta-section h3 { font-size: 22px; margin-bottom: 8px; }
.cta-section p { color: rgba(255,255,255,0.7); margin-bottom: 20px; font-size: 14px; }
.cta-box img { width: 160px; height: 160px; border-radius: 12px; display: block; margin: 0 auto; }
.cta-box p { font-size: 13px; margin-top: 12px; }

/* Footer */
footer { text-align: center; padding: 32px; color: var(--gray); font-size: 12px; }
</style>
</head>
<body>

<nav>
  <div class="logo">Data<span>Hunter</span></div>
  <span class="nav-badge">实时数据</span>
</nav>

<div class="container">

  <!-- Search -->
  <div class="search-section">
    <h2>1688 实时热销数据查询</h2>
    <p>输入任意品类关键词，实时查询1688平台真实销售数据</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="例如：手机壳、T恤、耳机、数据线" value="">
      <button id="searchBtn" onclick="doSearch()">查询</button>
    </div>
    <div class="quick-tags">
      <span onclick="quickSearch('手机壳')">手机壳</span>
      <span onclick="quickSearch('T恤')">T恤</span>
      <span onclick="quickSearch('蓝牙耳机')">蓝牙耳机</span>
      <span onclick="quickSearch('数据线')">数据线</span>
      <span onclick="quickSearch('运动鞋')">运动鞋</span>
      <span onclick="quickSearch('女装')">女装</span>
      <span onclick="quickSearch('充电宝')">充电宝</span>
      <span onclick="quickSearch('包包')">包包</span>
    </div>
  </div>

  <!-- Results -->
  <div class="results-section" id="results">
    <div class="result-header">
      <h3 id="resultTitle">查询结果</h3>
      <span id="resultCount">0 条数据</span>
    </div>
    <div id="resultContent"></div>
  </div>

  <!-- CTA -->
  <div class="cta-section" id="contact">
    <h3>需要更多数据？</h3>
    <p>全品类调研、竞品监控、选品分析，联系我们</p>
    <div class="cta-box">
      <img src="https://raw.githubusercontent.com/Jones521/xia-gong-factory/main/1fad4b1416162e431ef3d909be4e1258.jpg" alt="微信二维码">
      <p>长按识别二维码 · 备注"数据咨询"</p>
    </div>
  </div>

</div>

<footer>
  DataHunter · 跨境电商数据服务商<br>
  <small>数据来源：1688/Alibaba | 实时更新</small>
</footer>

<script>
// ============================================
// ⚠️ 配置：替换为你的 Cloudflare Worker URL
// ============================================
const WORKER_URL = "https://datahunter.workers.example.com"; // 改成你的 Worker 地址

async function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return;
  
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '查询中...';
  
  const resultsEl = document.getElementById('results');
  const contentEl = document.getElementById('resultContent');
  
  resultsEl.classList.add('show');
  document.getElementById('resultTitle').textContent = '「' + keyword + '」查询结果';
  contentEl.innerHTML = '<div class="loading"><div class="spinner"></div>正在从1688获取真实数据...</div>';
  
  try {
    const res = await fetch(`${WORKER_URL}?q=${encodeURIComponent(keyword)}`);
    const data = await res.json();
    
    if (data.error) {
      contentEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>查询失败</h3><p>${data.error}</p></div>`;
      return;
    }
    
    const products = data.products || [];
    
    if (products.length === 0) {
      contentEl.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>暂无数据</h3><p>该品类数据正在采集中，请联系客服获取</p></div>';
      return;
    }
    
    let html = '<table class="result-table"><thead><tr><th>产品</th><th>价格</th><th>已售</th></tr></thead><tbody>';
    
    products.forEach(p => {
      const soldClass = p.sold > 50000 ? 'high' : p.sold > 10000 ? 'medium' : 'low';
      const soldFormatted = p.sold > 0 ? p.sold.toLocaleString() + ' 件' : 'N/A';
      html += `<tr>
        <td>
          <div class="product-name">${escapeHtml(p.title)}</div>
          <span class="product-cat">${escapeHtml(p.cat)}</span>
        </td>
        <td class="price">${escapeHtml(p.price)}</td>
        <td><span class="sold ${soldClass}">${soldFormatted}</span></td>
      </tr>`;
    });
    
    html += '</tbody></table>';
    contentEl.innerHTML = html;
    document.getElementById('resultCount').innerHTML = `<span class="badge">${products.length} 条数据</span>`;
    
  } catch (err) {
    contentEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>网络错误</h3><p>${err.message}</p></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '查询';
  }
}

function quickSearch(keyword) {
  document.getElementById('searchInput').value = keyword;
  doSearch();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doSearch();
});
</script>

</body>
</html>
